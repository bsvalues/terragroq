name: WilliamOS Runtime Operator

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  issues:
    types: [labeled]

concurrency:
  group: williamos-runtime-operator
  cancel-in-progress: false

permissions: {}

jobs:
  control:
    if: vars.WILLIAMOS_RUNTIME_OPERATOR_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: read
    outputs:
      leased: ${{ steps.lease.outputs.leased }}
      issue_number: ${{ steps.lease.outputs.issue_number }}
      lease_id: ${{ steps.lease.outputs.lease_id }}
      work_order_id: ${{ steps.lease.outputs.work_order_id }}
      base_ref: ${{ steps.lease.outputs.base_ref }}
      remediation_pr: ${{ steps.lease.outputs.remediation_pr }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Reconcile open runtime pull requests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/runtime-operator/monitor.mjs

      - name: Recover expired leases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/runtime-operator/recover.mjs

      - name: Lease the oldest policy-eligible Work Order
        id: lease
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WILLIAMOS_RUNTIME_OPERATOR_ENABLED: ${{ vars.WILLIAMOS_RUNTIME_OPERATOR_ENABLED }}
        run: node scripts/runtime-operator/lease.mjs

      - name: Persist leased request
        if: steps.lease.outputs.leased == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-request-${{ github.run_id }}
          path: runtime-request
          if-no-files-found: error
          retention-days: 30

  codex:
    needs: control
    if: needs.control.outputs.leased == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.control.outputs.base_ref }}
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: runtime-request-${{ github.run_id }}
          path: runtime-request

      - name: Prepare structured result directory
        run: mkdir -p runtime-result

      - name: Run bounded Codex patch generation
        id: codex
        uses: openai/codex-action@b11346a6fa031e2e164ab4b7c7ea201afffd7d59 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: runtime-request/prompt.md
          output-file: runtime-result/result.json
          output-schema-file: .github/runtime-operator/codex-output.schema.json
          sandbox: read-only
          safety-strategy: drop-sudo
          allow-users: bsvalues

      - name: Persist structured Codex result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: runtime-result-${{ github.run_id }}
          path: runtime-result/result.json
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: [control, codex]
    if: needs.control.outputs.leased == 'true' && always() && needs.codex.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.control.outputs.base_ref }}
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: runtime-request-${{ github.run_id }}
          path: runtime-request

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: runtime-result-${{ github.run_id }}
          path: runtime-result

      - name: Parse and bind result to active lease
        id: result
        run: node scripts/runtime-operator/prepare-result.mjs

      - name: Reject secret-bearing model output
        run: node scripts/runtime-operator/scan-secrets.mjs runtime-result/result.json

      - name: Attest structured Codex result
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: runtime-result/result.json

      - name: Record authority wall
        if: steps.result.outputs.result == 'AUTHORITY_WALL'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.control.outputs.issue_number }}
          LEASE_ID: ${{ needs.control.outputs.lease_id }}
          CHECKPOINT_STATE: BLOCKED
          CHECKPOINT_DETAIL: Codex returned an authority wall without a patch.
        run: node scripts/runtime-operator/checkpoint.mjs

      - name: Record completed no-change result
        if: steps.result.outputs.result == 'NO_CHANGE'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.control.outputs.issue_number }}
          LEASE_ID: ${{ needs.control.outputs.lease_id }}
          CHECKPOINT_STATE: COMPLETED
          CHECKPOINT_DETAIL: Codex confirmed the Work Order required no repository change.
        run: node scripts/runtime-operator/checkpoint.mjs

      - name: Apply patch
        if: steps.result.outputs.result == 'PATCH_READY'
        run: git apply --index --whitespace=error-all runtime-result/change.patch

      - name: Enforce exact changed-path allowlist
        if: steps.result.outputs.result == 'PATCH_READY'
        run: node scripts/runtime-operator/verify-diff.mjs

      - name: Reject secret-bearing changed files
        if: steps.result.outputs.result == 'PATCH_READY'
        run: node scripts/runtime-operator/scan-secrets.mjs $(git diff --cached --name-only)

      - name: Install locked dependencies
        if: steps.result.outputs.result == 'PATCH_READY'
        run: npm ci

      - name: Validate patch
        if: steps.result.outputs.result == 'PATCH_READY'
        env:
          NEXT_PRIVATE_BUILD_WORKER: "0"
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          git diff --cached --check
          npm run lint
          npm test -- --run
          npm run build

      - name: Commit and push bounded change
        if: steps.result.outputs.result == 'PATCH_READY'
        id: push
        env:
          WORK_ORDER_ID: ${{ needs.control.outputs.work_order_id }}
          ISSUE_NUMBER: ${{ needs.control.outputs.issue_number }}
          BASE_REF: ${{ needs.control.outputs.base_ref }}
          REMEDIATION_PR: ${{ needs.control.outputs.remediation_pr }}
        run: |
          git config user.name "williamos-runtime-operator[bot]"
          git config user.email "williamos-runtime-operator[bot]@users.noreply.github.com"
          git commit -m "runtime(operator): complete ${WORK_ORDER_ID}"
          if [ -n "$REMEDIATION_PR" ]; then
            git push origin "HEAD:${BASE_REF}"
            echo "branch=${BASE_REF}" >> "$GITHUB_OUTPUT"
          else
            branch="runtime/$(echo "$WORK_ORDER_ID" | tr '[:upper:]' '[:lower:]')-issue-${ISSUE_NUMBER}"
            git switch -c "$branch"
            git push -u origin "$branch"
            echo "branch=$branch" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.result.outputs.result == 'PATCH_READY' && needs.control.outputs.remediation_pr == ''
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          WORK_ORDER_ID: ${{ needs.control.outputs.work_order_id }}
          ISSUE_NUMBER: ${{ needs.control.outputs.issue_number }}
          BRANCH: ${{ steps.push.outputs.branch }}
        run: |
          url=$(gh pr create --base main --head "$BRANCH" --title "runtime(operator): ${WORK_ORDER_ID}" --body "Bounded runtime Work Order. Closes #${ISSUE_NUMBER}. Merge remains gated by checks, review threads, and the runtime monitor.")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Resolve remediated review threads
        if: steps.result.outputs.result == 'PATCH_READY' && needs.control.outputs.remediation_pr != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REMEDIATION_PR: ${{ needs.control.outputs.remediation_pr }}
        run: node scripts/runtime-operator/resolve-threads.mjs

      - name: Record PR checkpoint
        if: steps.result.outputs.result == 'PATCH_READY'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.control.outputs.issue_number }}
          LEASE_ID: ${{ needs.control.outputs.lease_id }}
          CHECKPOINT_STATE: PR_OPEN
          CHECKPOINT_DETAIL: "${{ needs.control.outputs.remediation_pr != '' && format('Updated PR #{0}', needs.control.outputs.remediation_pr) || steps.pr.outputs.url }}"
        run: node scripts/runtime-operator/checkpoint.mjs
