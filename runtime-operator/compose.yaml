name: williamos-runtime-operator

services:
  operator:
    build:
      context: ..
      dockerfile: runtime-operator/Dockerfile
    restart: unless-stopped
    environment:
      GITHUB_REPOSITORY: bsvalues/terragroq
      WILLIAMOS_RUNTIME_HOST_STATUS: SUPERSEDED_IDENTITY_HOST / DISABLED
    secrets:
      - activation
    volumes:
      - operator-state:/state
      - operator-audit:/audit
      - operator-workspace:/workspace
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

secrets:
  activation:
    file: ${WILLIAMOS_OPERATOR_HOME}/control/activation

volumes:
  operator-state:
  operator-audit:
  operator-workspace:
